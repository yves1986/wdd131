<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album - Filtered Gallery</title>
    <meta name="description" content="A gallery of LDS temples with filtering options">
    <meta name="author" content="Djeamin Yves">
    <link rel="stylesheet" href="styles/filtered-temples.css">
</head>

<body>
    <header>
        <h1>⛪ Temple Album</h1>

    <main>
        <div id="temple-cards" class="grid-container"></div>

    <footer>
        <p>&copy; <span id="year"></span> Djeamin Yves | Temple Album</p>
        <p>Last Modified: <span id="lastModified"></span></p>
