<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album · WDD131</title>

    <!-- Google Fonts · Elegant Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <!-- CSS: mobile-first → small first, then large -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- Deferred JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>
    <header>

        <nav>

                <li><a href="#">Large</a></li>

    <main class="album-grid">
        <h1>My Temple Collection</h1>

    <footer>
        <p id="footer-info"></p>
    </footer>

</html>
